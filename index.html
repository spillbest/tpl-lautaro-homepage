document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t-size:15px;font-weight:800;text-decoration:none\">Piazza la tua scommessa →<\u002Fa>\n      <\u002Fdiv>\n      <div>\n        <h2 style=\"font-family:'Anton';font-weight:400;font-size:36px;line-height:1.04;letter-spacing:-.3px;text-transform:uppercase;margin:0 0 18px\">Longshot di valore, non da prima pagina<\u002Fh2>\n        <p style=\"font-size:16px;line-height:1.6;color:#b9bec8;margin:0 0 20px\">Il mercato punta i riflettori su Messi e Mbappé. Ma una punta centrale, in un torneo dal percorso lungo e con costante presenza in area, è esattamente il profilo che ripaga le quote alte.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:12px\">\n          <div style=\"display:flex;align-items:center;gap:14px\"><span style=\"width:8px;height:8px;border-radius:50%;background:#c9ff3a\"><\u002Fspan><span style=\"font-size:15px;color:#dfe2e8\">Punta centrale — finalizza, non rifinisce<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:14px\"><span style=\"width:8px;height:8px;border-radius:50%;background:#c9ff3a\"><\u002Fspan><span style=\"font-size:15px;color:#dfe2e8\">Percorso da campione in carica = più partite<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:14px\"><span style=\"width:8px;height:8px;border-radius:50%;background:#c9ff3a\"><\u002Fspan><span style=\"font-size:15px;color:#dfe2e8\">Presenza in area e rigori nelle gambe<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:12px;color:#6b6f78;margin:24px 0 0;font-style:italic\">Informazione di mercato, non consiglio di gioco. Le quote variano. 18+.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== 05 PER I TIFOSI ITALIANI ===================== -->\n  <section style=\"padding:90px 40px;border-bottom:1px solid rgba(255,255,255,.07)\">\n    <div style=\"font-family:'Spline Sans Mono';font-size:12px;letter-spacing:.18em;color:#8b8f99;text-transform:uppercase;margin-bottom:24px\">05 — Per i tifosi italiani<\u002Fdiv>\n    <h2 style=\"font-family:'Anton';font-weight:400;font-size:40px;line-height:1.02;letter-spacing:-.3px;text-transform:uppercase;margin:0 0 30px;max-width:840px\">Perché anche chi non è interista può rispettarlo<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:14px\">\n      <div style=\"background:#14161b;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:22px\"><div style=\"font-size:15px;font-weight:700;line-height:1.3\">Conosce le nostre difese<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#14161b;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:22px\"><div style=\"font-size:15px;font-weight:700;line-height:1.3\">Segna sotto pressione<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#14161b;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:22px\"><div style=\"font-size:15px;font-weight:700;line-height:1.3\">Gioca per la squadra<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#14161b;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:22px\"><div style=\"font-size:15px;font-weight:700;line-height:1.3\">Rappresenta il calcio italiano all'estero<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#14161b;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:22px\"><div style=\"font-size:15px;font-weight:700;line-height:1.3\">Affidabile, non solo spettacolare<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== 06 STORIA IN EVIDENZA ===================== -->\n  <section id=\"news\" style=\"padding:90px 40px;background:#0c0d11;border-bottom:1px solid rgba(255,255,255,.07)\">\n    <div style=\"font-family:'Spline Sans Mono';font-size:12px;letter-spacing:.18em;color:#8b8f99;text-transform:uppercase;margin-bottom:34px\">06 — Storia in evidenza<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1.1fr .9fr;gap:40px;align-items:center;background:#0a0b0e;border:1px solid rgba(255,255,255,.08);border-radius:22px;overflow:hidden\">\n      <div style=\"padding:48px\">\n        <div style=\"display:inline-block;font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.12em;color:#0a0b0e;background:#c9ff3a;padding:5px 10px;border-radius:6px;text-transform:uppercase;font-weight:600\">Match report<\u002Fdiv>\n        <h2 style=\"font-family:'Anton';font-weight:400;font-size:44px;line-height:1.02;letter-spacing:-.3px;text-transform:uppercase;margin:18px 0 16px\">Il gol che ha cambiato il suo Mondiale<\u002Fh2>\n        <p style=\"font-size:16px;line-height:1.6;color:#b9bec8;margin:0\">Il rigore contro la Giordania: il primo gol mondiale di Lautaro, la fine di un lungo digiuno. Si è preso la responsabilità dal dischetto mentre Messi partiva dalla panchina — il segnale di una squadra che si poggia, ancora, sul suo numero 9.<\u002Fp>\n        <a href=\"#\" style=\"display:inline-flex;align-items:center;gap:8px;margin-top:24px;font-size:15px;font-weight:700;color:#2f6bff;text-decoration:none\">Leggi la storia <span>→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n      <image-slot id=\"lautaro-story\" style=\"display:block;width:100%;height:360px\" shape=\"rect\" placeholder=\"Trascina la foto del gol\"><\u002Fimage-slot>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== 07 CONFRONTO ===================== -->\n  <section style=\"padding:90px 40px;border-bottom:1px solid rgba(255,255,255,.07)\">\n    <div style=\"font-family:'Spline Sans Mono';font-size:12px;letter-spacing:.18em;color:#8b8f99;text-transform:uppercase;margin-bottom:24px\">07 — Confronto<\u002Fdiv>\n    <h2 style=\"font-family:'Anton';font-weight:400;font-size:40px;line-height:1;letter-spacing:-.3px;text-transform:uppercase;margin:0 0 34px\">Perché Lautaro sugli altri<\u002Fh2>\n    <div style=\"border:1px solid rgba(255,255,255,.1);border-radius:18px;overflow:hidden\">\n      <div style=\"display:grid;grid-template-columns:1.1fr 1fr 1.1fr 1fr ua scommessa <span style=\"font-size:21px\">→<\u002Fspan><\u002Fa>\n      <div style=\"font-size:13px;color:#6b6f78;margin-top:22px\">18+ · Gioca responsabilmente · Le quote possono variare<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== FOOTER ===================== -->\n  <footer style=\"padding:46px 40px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:20px;background:#0c0d11\">\n    <div style=\"display:flex;align-items:baseline;gap:8px\"><span style=\"font-family:'Anton';font-size:20px\">LAUTARO<\u002Fspan><span style=\"font-family:'Spline Sans Mono';font-size:12px;font-weight:600;color:#c9ff3a\">·10<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;gap:24px;flex-wrap:wrap\">\n      <a href=\"#stats\" style=\"font-size:13px;color:#8b8f99;text-decoration:none\">Statistiche Mondiale<\u002Fa>\n      <a href=\"#bio\" style=\"font-size:13px;color:#8b8f99;text-decoration:none\">Biografia<\u002Fa>\n      <a href=\"#odds\" style=\"font-size:13px;color:#8b8f99;text-decoration:none\">Quote<\u002Fa>\n      <a href=\"#bet\" style=\"font-size:13px;color:#8b8f99;text-decoration:none\">Vota<\u002Fa>\n      <a href=\"#news\" style=\"font-size:13px;color:#8b8f99;text-decoration:none\">News<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"font-size:12px;color:#5a5e66\">© 2026 · Sito editoriale non ufficiale<\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- ===================== STICKY BET BAR ===================== -->\n  <div style=\"position:sticky;bottom:0;z-index:60;display:flex;align-items:center;gap:16px;padding:14px 24px;background:rgba(10,11,14,.92);backdrop-filter:blur(14px);border-top:1px solid rgba(255,255,255,.1)\">\n    <span style=\"font-family:'Spline Sans Mono';font-size:12px;letter-spacing:.1em;color:#8b8f99;text-transform:uppercase\">Capocannoniere Mondiale<\u002Fspan>\n    <span style=\"font-family:'Anton';font-size:24px;color:#c9ff3a\">+4900<\u002Fspan>\n    <a href=\"#bet\" style=\"margin-left:auto;display:inl
